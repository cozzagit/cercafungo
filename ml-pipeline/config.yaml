# ============================================================
# CercaFungo ML Pipeline — Configurazione Centrale
# ============================================================

# --- Percorsi ---
paths:
  base_dir: "./data"
  raw_images: "./data/raw"
  synthetic_images: "./data/synthetic"
  processed_dataset: "./data/processed"
  backgrounds: "./data/backgrounds"
  models_output: "./models"
  exports_output: "./exports"
  app_assets: "../assets/models"  # Cartella assets dell'app React Native
  manual_photos: "./data/raw/manual"  # Foto raccolte manualmente
  annotations: "./data/annotations"  # Annotazioni manuali YOLO

# --- iNaturalist API ---
inaturalist:
  base_url: "https://api.inaturalist.org/v1"
  # Bounding box: Alpi e Prealpi italiane
  bounding_box:
    sw_lat: 45.5
    sw_lng: 8.5
    ne_lat: 47.0
    ne_lng: 12.5
  quality_grade: "research"  # Solo osservazioni verificate dalla community
  max_photos_per_species: 1000
  rate_limit_delay: 1.1  # Secondi tra richieste (rispetto API)
  per_page: 200  # Max consentito da iNaturalist

# --- Flickr API ---
flickr:
  api_key: null       # Impostare via env var FLICKR_API_KEY
  api_secret: null    # Impostare via env var FLICKR_API_SECRET
  # Termini di ricerca per foto di funghi
  search_terms:
    - "porcini mushroom"
    - "boletus edulis"
    - "funghi bosco"
    - "mushroom forest"
    - "chanterelle"
    - "gallinaccio finferlo"
    - "amanita muscaria"
    - "wild mushroom Italy"
    - "fungo velenoso"
  # Solo licenze Creative Commons
  license_ids: "1,2,3,4,5,6"  # CC-BY, CC-BY-SA, CC-BY-ND, CC-BY-NC, CC-BY-NC-SA, CC-BY-NC-ND
  max_photos_per_query: 500
  photo_size: "url_l"  # large 1024 (url_o per originale)
  rate_limit_delay: 1.0
  output_dir: "./data/raw/flickr"

# --- Roboflow ---
roboflow:
  # Progetti pubblici su Roboflow Universe per mushroom detection
  projects:
    - workspace: "mushroom-detection"
      project: "mushroom-detector"
      version: 1
      format: "yolov8"
    - workspace: "fungi-detection"
      project: "fungi"
      version: 1
      format: "yolov8"
  # Se hai una API key Roboflow (opzionale per dataset pubblici)
  api_key: null  # Impostare via env var ROBOFLOW_API_KEY

# --- Sfondi per dati sintetici ---
backgrounds:
  # Termini di ricerca per sfondi di sottobosco
  search_terms:
    - "forest floor"
    - "sottobosco"
    - "forest ground"
    - "leaf litter"
    - "moss forest"
    - "woodland floor"
    - "foglie bosco"
  target_count: 500  # Obiettivo minimo sfondi diversi
  min_resolution: 640  # Minima risoluzione accettabile
  # Fonti
  flickr:
    enabled: true
    max_per_query: 100
  unsplash:
    enabled: true
    access_key: null  # Impostare via env var UNSPLASH_ACCESS_KEY
    max_per_query: 30


# --- Training Detector (YOLOv8n — Stage 1) ---
detector:
  model: "yolov8n.pt"  # Nano per mobile
  image_size: 640
  epochs: 100
  batch_size: 16
  patience: 15  # Early stopping
  optimizer: "AdamW"
  learning_rate: 0.001
  weight_decay: 0.0005
  warmup_epochs: 5
  cos_lr: true  # Cosine annealing
  augment: true  # Augmentation built-in di ultralytics
  mosaic: 1.0
  mixup: 0.1
  classes:
    - "fungo"  # Singola classe per detection
  num_workers: 4
  device: "auto"  # auto = GPU se disponibile, altrimenti CPU
  project_name: "cercafungo-detector"
  wandb:
    enabled: false
    project: "cercafungo"
    entity: null

# --- Training Classifier (EfficientNet-B0 — Stage 2) ---
classifier:
  model: "efficientnet_b0"
  image_size: 224
  num_classes: 49  # 48 specie + sconosciuto
  epochs: 50
  batch_size: 32
  patience: 10
  learning_rate: 0.0003
  weight_decay: 0.01
  warmup_epochs: 3
  scheduler: "cosine"  # cosine | step | plateau
  step_size: 10
  gamma: 0.1
  freeze_backbone_epochs: 5  # Fine-tune solo head per i primi N epoch
  dropout: 0.3
  label_smoothing: 0.1
  num_workers: 4
  device: "auto"
  project_name: "cercafungo-classifier"

# --- Synthetic Data ---
synthetic:
  num_images: 7500  # Target immagini sintetiche
  mushrooms_per_image:
    min: 1
    max: 4
  scale_range:  # Simula distanza 2-5 metri
    min: 0.05
    max: 0.35
  occlusion_probability: 0.3
  max_occlusion: 0.4  # Max 40% coperto
  shadow_probability: 0.6
  blur_probability: 0.3
  noise_probability: 0.2
  background_sources:
    - "https://unsplash.com/s/photos/forest-floor"  # Reference, download manuale
  output_format: "yolov8"

# --- Dataset Split ---
dataset:
  train_ratio: 0.70
  val_ratio: 0.20
  test_ratio: 0.10
  seed: 42
  min_image_size: 320  # Scarta immagini troppo piccole

# --- Export Mobile ---
export:
  tflite:
    quantize: true
    quantization: "int8"  # int8 | float16 | dynamic
    representative_dataset_size: 200  # Immagini per calibrazione INT8
  coreml:
    compute_units: "ALL"  # ALL | CPU_AND_NE | CPU_ONLY
    minimum_deployment_target: "iOS15"
  onnx:
    opset: 17
    simplify: true
  test_inference: true
  copy_to_app: true

# --- Annotation Tool ---
annotation:
  default_class: 0  # classe "fungo" per detection
  bbox_color: [0, 255, 0]  # Verde
  bbox_thickness: 2
  font_scale: 0.6
  window_width: 1280
  window_height: 960
  save_format: "yolo"  # yolo | coco | voc

# --- Camera Collector ---
camera:
  default_resolution: [1280, 720]
  jpeg_quality: 95
  save_gps: true
  auto_prefix: "cercafungo"

# --- Pipeline Orchestrator ---
pipeline:
  stages:
    - name: "download"
      description: "Scarica dataset da iNaturalist, Roboflow e Flickr"
      scripts:
        - "dataset.download_inaturalist"
        - "dataset.download_roboflow"
        - "dataset.download_flickr"
        - "dataset.download_backgrounds"
    - name: "prepare"
      description: "Prepara dataset sintetico e unificato"
      scripts:
        - "dataset.synthetic_generator"
        - "dataset.prepare_dataset"
    - name: "train"
      description: "Addestra detector e classificatore"
      scripts:
